{% extends "base.html" %}

{% block title %}Gráfico por Origem - Sistema de Pesquisa de Marketing{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4><i class="fas fa-chart-pie"></i> Gráfico de Clientes por Origem</h4>
            </div>
            <div class="card-body">
                <canvas id="origemChart" width="400" height="200"></canvas>
                <div class="mt-3">
                    <a href="{{ url_for('relatorios') }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Voltar
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const ctx = document.getElementById('origemChart').getContext('2d');
    const labels = {{ labels | tojson }};
    const data = {{ data | tojson }};

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                label: 'Clientes por Origem',
                data: data,
                backgroundColor: [
                    '#FF6384',
                    '#36A2EB',
                    '#FFCE56',
                    '#4BC0C0',
                    '#9966FF',
                    '#FF9F40'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                },
                title: {
                    display: true,
                    text: 'Distribuição de Clientes por Origem'
                }
            }
        }
    });
});
</script>
{% endblock %}
{% endblock %}
