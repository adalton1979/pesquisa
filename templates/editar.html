{% extends "base.html" %}

{% block title %}Editar Cliente - Sistema de Pesquisa de Marketing{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4><i class="fas fa-edit"></i> Editar Cliente</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nome" class="form-label">Nome do Cliente</label>
                            <input type="text" class="form-control" id="nome" name="nome" value="{{ cliente.nome }}" required style="text-transform: uppercase;">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="origem" class="form-label">Origem</label>
                            <select class="form-select" id="origem" name="origem" required>
                                {% for origem in origens %}
                                <option value="{{ origem }}" {% if origem == cliente.origem %}selected{% endif %}>{{ origem }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="regiao_origem" class="form-label">Região Origem</label>
                            <input type="text" class="form-control" id="regiao_origem" name="regiao_origem" value="{{ cliente.regiao_origem }}" required style="text-transform: uppercase;">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="contrato" class="form-label">Contrato</label>
                            <input type="text" class="form-control" id="contrato" name="contrato" value="{{ cliente.contrato }}" required style="text-transform: uppercase;">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="atendente" class="form-label">Atendente</label>
                            <input type="text" class="form-control" id="atendente" name="atendente" value="{{ cliente.atendente }}" required style="text-transform: uppercase;">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="data_cadastro" class="form-label">Data Cadastro</label>
                            <input type="date" class="form-control" id="data_cadastro" name="data_cadastro" value="{{ cliente.data_cadastro }}" readonly>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="data_pesquisa" class="form-label">Data Pesquisa</label>
                            <input type="date" class="form-control" id="data_pesquisa" name="data_pesquisa" value="{{ cliente.data_pesquisa }}">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="observacoes" class="form-label">Observações</label>
                            <textarea class="form-control" id="observacoes" name="observacoes" rows="3" style="text-transform: uppercase;">{{ cliente.observacoes }}</textarea>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Salvar Alterações
                        </button>
                        <a href="{{ url_for('visualizacao') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Transformar inputs para maiúsculo
    document.querySelectorAll('input[type="text"], textarea').forEach(function(el) {
        el.addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });
    });
});
</script>
{% endblock %}
