{% extends "base.html" %}

{% block title %}Login - Sistema de Pesquisa de Marketing{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-sign-in-alt"></i> Login</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="usuario" class="form-label">Usuário</label>
                        <input type="text" class="form-control" id="usuario" name="usuario" required>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Entrar
                        </button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <a href="{{ url_for('recuperar_senha') }}" class="text-decoration-none">
                        <i class="fas fa-key"></i> Esqueci minha senha
                    </a>
                </div>
                <hr>
                <div class="text-center">
                    <a href="{{ url_for('cadastro_usuario') }}" class="btn btn-outline-secondary">
                        <i class="fas fa-user-plus"></i> Cadastrar Usuário
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
